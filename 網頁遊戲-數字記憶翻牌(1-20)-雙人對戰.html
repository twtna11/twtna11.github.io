<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字記憶翻牌(1-20)-雙人對戰</title>
    <style>
        /* 定義全域變數，確保顏色一致性 */
        :root {
            --card-width: 80px;
            --card-height: 110px;
            --gap: 10px;
            
            /* 顏色定義 */
            --blue-color: #2196F3;       /* 藍方統一色碼 */
            --blue-bg: rgba(33, 150, 243, 0.1);
            
            --red-color: #F44336;        /* 紅方統一色碼 */
            --red-bg: rgba(244, 67, 54, 0.1);
            
            --gray-bg: #f0f2f5;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--gray-bg);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        /* 比分板區域 */
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .player-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            opacity: 0.4; /* 非回合玩家淡化 */
            border: 3px solid transparent;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-score {
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* 藍方樣式 (使用變數) */
        .panel-blue {
            color: var(--blue-color);
        }
        .panel-blue.active {
            opacity: 1;
            background-color: var(--blue-bg);
            border-color: var(--blue-color);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }

        /* 紅方樣式 (使用變數) */
        .panel-red {
            color: var(--red-color);
        }
        .panel-red.active {
            opacity: 1;
            background-color: var(--red-bg);
            border-color: var(--red-color);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.3);
        }

        /* 按鈕樣式 */
        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #607d8b;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.3s;
            font-weight: bold;
        }
        button:hover { background-color: #546e7a; }

        /* 遊戲區域：4列 x 10行 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: var(--gap);
            perspective: 1000px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        /* 翻牌狀態 */
        .card.flip { transform: rotateY(180deg); }
        
        /* 修正後的消失邏輯：
           1. 直接操作 opacity，不使用 visibility 延遲。
           2. pointer-events: none 確保消失後無法被點擊。
        */
        .card.hidden {
            opacity: 0; 
            pointer-events: none;
            transition: opacity 0.5s ease; /* 父層統一過渡，確保子元素同步 */
        }

        /* 確保消失時移除陰影，避免殘留視覺干擾 */
        .card.hidden .card-front,
        .card.hidden .card-back {
            box-shadow: none;
            border-color: transparent;
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            user-select: none;
        }

        .card-front {
            background-color: white;
            color: #333;
            font-size: 2rem;
            font-weight: bold;
            transform: rotateY(180deg);
            border: 2px solid #ddd;
        }

        .card-back {
            /* 保持中性顏色，避免偏向紅或藍 */
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
            color: white;
            font-size: 1.5rem;
        }

        /* 響應式調整 */
        @media (max-width: 950px) {
            :root {
                --card-width: 50px;
                --card-height: 70px;
                --gap: 5px;
            }
            .card-front { font-size: 1.5rem; }
            .score-board { margin-bottom: 10px; padding: 10px; }
            .player-name { font-size: 1rem; }
            .player-score { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <h1>雙人數字記憶翻牌對決</h1>
    
    <div class="score-board">
        <div class="player-panel panel-blue active" id="panel-blue">
            <div class="player-name">藍方 (先手)</div>
            <div class="player-score" id="score-blue">0</div>
        </div>

        <div class="player-panel panel-red" id="panel-red">
            <div class="player-name">紅方</div>
            <div class="player-score" id="score-red">0</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="initGame()">重新開始遊戲</button>
    </div>

    <div class="game-board" id="gameBoard">
        </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const panelBlue = document.getElementById('panel-blue');
        const panelRed = document.getElementById('panel-red');
        const scoreElBlue = document.getElementById('score-blue');
        const scoreElRed = document.getElementById('score-red');

        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;
        const totalPairs = 20;

        let currentPlayer = 'blue'; 
        let scores = { blue: 0, red: 0 };

        function initGame() {
            cards = [];
            matchesFound = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            
            scores.blue = 0;
            scores.red = 0;
            scoreElBlue.innerText = '0';
            scoreElRed.innerText = '0';
            
            currentPlayer = 'blue';
            updateTurnVisuals();

            gameBoard.innerHTML = '';
            
            let numbers = [];
            for (let i = 1; i <= 20; i++) {
                numbers.push(i);
                numbers.push(i);
            }

            shuffle(numbers);

            numbers.forEach(number => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.number = number;

                card.innerHTML = `
                    <div class="card-front">${number}</div>
                    <div class="card-back">?</div>
                `;

                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.number === secondCard.dataset.number;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            scores[currentPlayer]++;
            updateScoreDisplay();

            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            // 延遲一下讓玩家看清楚配對成功
            setTimeout(() => {
                // 加入 hidden class 觸發 CSS opacity transition
                firstCard.classList.add('hidden');
                secondCard.classList.add('hidden');
                
                resetBoard();
                
                matchesFound++;
                if (matchesFound === totalPairs) {
                    declareWinner();
                }
                // 配對成功不換人
            }, 800);
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                
                resetBoard();
                switchTurn(); 
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function switchTurn() {
            currentPlayer = currentPlayer === 'blue' ? 'red' : 'blue';
            updateTurnVisuals();
        }

        function updateTurnVisuals() {
            if (currentPlayer === 'blue') {
                panelBlue.classList.add('active');
                panelRed.classList.remove('active');
            } else {
                panelRed.classList.add('active');
                panelBlue.classList.remove('active');
            }
        }

        function updateScoreDisplay() {
            scoreElBlue.innerText = scores.blue;
            scoreElRed.innerText = scores.red;
        }

        function declareWinner() {
            // 延遲 0.6 秒等待最後的卡片消失動畫完成
            setTimeout(() => {
                let msg = '';
                if (scores.blue > scores.red) {
                    msg = `🎉 遊戲結束！藍方獲勝！ (比分 ${scores.blue} : ${scores.red})`;
                } else if (scores.red > scores.blue) {
                    msg = `🎉 遊戲結束！紅方獲勝！ (比分 ${scores.red} : ${scores.blue})`;
                } else {
                    msg = `🤝 遊戲結束！雙方平手！ (比分 ${scores.blue} : ${scores.red})`;
                }
                alert(msg);
            }, 600);
        }

        initGame();
    </script>
</body>
</html>
