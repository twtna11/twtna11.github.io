<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 側邊欄滑入效果</title>
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #3498db;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden; /* 防止側邊欄在外面時出現捲軸 */
        }

        /* 內容遮罩層 (點擊選單外區域可關閉) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 99;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* 側邊欄本體 */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1); /* 初始位置：完全藏在左側外 */
            width: var(--sidebar-width);
            height: 100%;
            background-color: #2c3e50;
            color: white;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); /* 貝茲曲線讓動效更自然 */
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        /* 側邊欄開啟狀態 */
        .sidebar.active {
            transform: translateX(var(--sidebar-width)); /* 向右滑入 */
        }

        /* 選單項目樣式 */
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin-top: 50px;
        }

        .sidebar li {
            padding: 15px 0;
            border-bottom: 1px solid #34495e;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar li:hover {
            color: var(--primary-color);
        }

        /* 按鈕樣式 */
        .menu-btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            margin: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">開啟選單</button>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <h2>導覽選單</h2>
        <ul>
            <li>首頁</li>
            <li>關於我們</li>
            <li>服務項目</li>
            <li>聯絡我們</li>
        </ul>
        <button class="menu-btn" style="background: #e74c3c;" onclick="toggleSidebar()">關閉</button>
    </nav>

    <div style="padding: 20px;">
        <h1>主要內容區域</h1>
        <p>點擊左上角按鈕即可看到側邊欄滑入效果。</p>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }
    </script>

</body>
</html>
