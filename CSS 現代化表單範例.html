<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代化 CSS 表單範例</title>
    <style>
        /* 基礎設定 */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 表單卡片容器 */
        .form-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }

        /* 輸入框通用樣式 */
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box; /* 避免 padding 撐破寬度 */
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.2);
        }

        /* 單選與複選框佈局 */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-group label, .checkbox-group label {
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        input[type="radio"], input[type="checkbox"] {
            margin-right: 6px;
            cursor: pointer;
        }

        /* 提交按鈕 */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* 響應式微調 */
        @media (max-width: 480px) {
            .form-card {
                padding: 20px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>聯絡我們</h2>
    <form action="#" method="post">
        
        <div class="form-group">
            <label for="name">全名</label>
            <input type="text" id="name" name="name" placeholder="例如：王小明" required>
        </div>

        <div class="form-group">
            <label for="email">電子郵件信箱</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
            <label for="category">詢問類別</label>
            <select id="category" name="category">
                <option value="service">產品諮詢</option>
                <option value="tech">技術支援</option>
                <option value="other">其他問題</option>
            </select>
        </div>

        <div class="form-group">
            <label>您目前的身分</label>
            <div class="radio-group">
                <label><input type="radio" name="role" value="student" checked> 學生</label>
                <label><input type="radio" name="role" value="worker"> 上班族</label>
            </div>
        </div>

        <div class="form-group">
            <label for="message">您的留言</label>
            <textarea id="message" name="message" rows="4" placeholder="請輸入您的內容..."></textarea>
        </div>

        <div class="form-group">
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" name="subscribe" checked> 我同意接收電子報
                </label>
            </div>
        </div>

        <button type="submit">確認送出</button>

    </form>
</div>

</body>
</html>
