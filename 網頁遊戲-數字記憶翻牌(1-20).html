<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字記憶翻牌遊戲 (1-20)</title>
    <style>
        :root {
            --card-width: 80px;
            --card-height: 110px;
            --gap: 10px;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }
        h2 {
            font-size: 1rem;
            color: #b2b0b0;
        }

        .info-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #timer {
            font-weight: bold;
            color: #d9534f;
        }

        button {
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        /* 遊戲區域：4列 x 10行 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: var(--gap);
            perspective: 1000px; /* 為3D翻轉效果提供透視 */
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 卡片容器 */
        .card {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        /* 翻牌動作 */
        .card.flip {
            transform: rotateY(180deg);
        }

        /* 配對成功後隱藏 (保持佔位) */
        .card.hidden {
            visibility: hidden;
            opacity: 0;
            cursor: default;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        /* 卡片正反面共用樣式 */
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden; /* 隱藏背面 */
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
        }

        /* 卡片正面 (顯示數字) */
        .card-front {
            background-color: white;
            color: #333;
            font-size: 2rem;
            font-weight: bold;
            transform: rotateY(180deg); /* 預設先轉過去 */
            border: 2px solid #ddd;
        }

        /* 卡片背面 (花色) */
        .card-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.5rem;
        }

        /* 響應式調整：螢幕太小時縮小卡片 */
        @media (max-width: 950px) {
            :root {
                --card-width: 50px;
                --card-height: 70px;
                --gap: 5px;
            }
            .card-front { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <h1>數字記憶翻牌遊戲(1-20)</h1>
    <h2>翻到兩張相同數字,紙牌會消失,直到消去全部的紙牌為止</h2>
    
    <div class="info-bar">
        <div>時間: <span id="timer">00:00</span></div>
        <button onclick="restartGame()">重新開始</button>
    </div>

    <div class="game-board" id="gameBoard">
        </div>

    <script>
        const gameBoard = document.getElementById('gameBoard');
        const timerElement = document.getElementById('timer');
        
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false; // 鎖定版面，防止一次點三張
        let firstCard, secondCard;
        let matchesFound = 0;
        const totalPairs = 20;
        
        // 計時器變數
        let timerInterval;
        let seconds = 0;
        let isTimerRunning = false;

        // 初始化遊戲
        function initGame() {
            // 1. 重置變數
            cards = [];
            matchesFound = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            gameBoard.innerHTML = '';
            
            // 2. 重置計時器
            stopTimer();
            seconds = 0;
            timerElement.innerText = "00:00";
            isTimerRunning = false;

            // 3. 生成數字陣列 (1-20 各兩張)
            let numbers = [];
            for (let i = 1; i <= 20; i++) {
                numbers.push(i);
                numbers.push(i);
            }

            // 4. 洗牌 (Fisher-Yates Shuffle)
            shuffle(numbers);

            // 5. 建立 HTML 元素
            numbers.forEach(number => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.number = number; // 用於比對數字

                card.innerHTML = `
                    <div class="card-front">${number}</div>
                    <div class="card-back">?</div>
                `;

                card.addEventListener('click', flipCard);
                gameBoard.appendChild(card);
            });
        }

        // 洗牌演算法
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 翻牌邏輯
        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return; // 防止點擊同一張牌兩次

            // 開始計時 (如果是第一次點擊)
            if (!isTimerRunning) {
                startTimer();
                isTimerRunning = true;
            }

            this.classList.add('flip');

            if (!hasFlippedCard) {
                // 第一次翻牌
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // 第二次翻牌
            secondCard = this;
            checkForMatch();
        }

        // 檢查是否配對
        function checkForMatch() {
            let isMatch = firstCard.dataset.number === secondCard.dataset.number;

            isMatch ? disableCards() : unflipCards();
        }

        // 配對成功
        function disableCards() {
            // 鎖定這兩張牌的點擊事件
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            // 延遲一下讓玩家看到數字，然後讓卡片消失
            setTimeout(() => {
                firstCard.classList.add('hidden');
                secondCard.classList.add('hidden');
                resetBoard();
                
                matchesFound++;
                if (matchesFound === totalPairs) {
                    gameWon();
                }
            }, 800);
        }

        // 配對失敗
        function unflipCards() {
            lockBoard = true; // 鎖定版面，等待翻回去

            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000); // 1秒後蓋牌
        }

        // 重置選取狀態
        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // 計時器邏輯
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                timerElement.innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // 遊戲勝利
        function gameWon() {
            stopTimer();
            // 給一點延遲讓最後一張牌消失動畫跑完
            setTimeout(() => {
                alert(`恭喜！你完成了遊戲！\n耗時: ${timerElement.innerText}`);
            }, 500);
        }

        // 重新開始按鈕
        function restartGame() {
            initGame();
        }

        // 頁面載入時初始化
        initGame();

    </script>
</body>
</html>
