<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深淺色模式切換教學</title>
    <style>
        /* * 1. 定義全域變數 (CSS Variables)
         * 這些是預設的「淺色模式」顏色
         */
        :root {
            --bg-color: #f0f4f8;       /* 背景色：淺灰白 */
            --text-color: #333333;     /* 文字色：深灰 */
            --card-bg: #ffffff;        /* 卡片背景：純白 */
            --btn-bg: #3b82f6;         /* 按鈕背景：藍色 */
            --btn-text: #ffffff;       /* 按鈕文字：白色 */
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* 陰影 */
        }

        /* * 2. 定義「深色模式」下的變數覆蓋 
         * 當 body 標籤擁有 "dark-mode" 這個 class 時，變數會變成以下的值
         */
        body.dark-mode {
            --bg-color: #121212;       /* 背景色：極深灰 */
            --text-color: #e0e0e0;     /* 文字色：淺灰 */
            --card-bg: #1e1e1e;        /* 卡片背景：深灰 */
            --btn-bg: #fbbf24;         /* 按鈕背景：琥珀黃 (對比色) */
            --btn-text: #121212;       /* 按鈕文字：深色 */
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.5); /* 陰影加深 */
        }

        /* 基礎排版設定 (Flexbox 置中) */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            
            /* * 3. 關鍵轉場效果 (Transition) 
             * 讓顏色切換時有平滑的過渡，而不是瞬間跳轉
             */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 卡片容器樣式 */
        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 400px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        h1 {
            margin-top: 0;
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* 按鈕樣式 */
        .toggle-btn {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.3s ease, color 0.3s ease;
        }

        .toggle-btn:active {
            transform: scale(0.95); /* 點擊時的小縮放效果 */
        }
        
        /* 表情符號的樣式 */
        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="icon" id="modeIcon">☀️</span>
        <h1>深淺色模式切換</h1>
        <p>
            點擊下方的按鈕，觀察網頁背景、文字顏色以及卡片樣式如何平滑地改變。這是透過 CSS 變數與 JavaScript 類別切換實現的。
        </p>
        <button class="toggle-btn" id="themeToggle">切換至深色模式 🌙</button>
    </div>

    <script>
        // 1. 抓取按鈕與圖示元素
        const toggleBtn = document.getElementById('themeToggle');
        const modeIcon = document.getElementById('modeIcon');
        const body = document.body;

        // 2. 監聽點擊事件
        toggleBtn.addEventListener('click', () => {
            
            // 3. 切換 body 的 class (如果沒有 dark-mode 就加上，如果有就移除)
            body.classList.toggle('dark-mode');

            // 4. 判斷目前的模式，更新按鈕文字與圖示 (教學重點：條件判斷)
            if (body.classList.contains('dark-mode')) {
                toggleBtn.textContent = '切換至淺色模式 ☀️';
                modeIcon.textContent = '🌙';
            } else {
                toggleBtn.textContent = '切換至深色模式 🌙';
                modeIcon.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
